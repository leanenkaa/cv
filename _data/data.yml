career-profile:
  title: Career Profile
  summary: |
    Infrastructure platform engineer with 15+ years of experience building developer tools, infrastructure platforms,
    and observability systems at scale. Golang background — authored Terraform providers, Kubernetes
    operators, custom control planes, and internal platform services. Proven ability to drive cross-company
    platform adoption, from OpenTelemetry rollouts to on-call and observability systems migrations. 
    Focused on reliability, scalability, and data-driven operational excellence.

